<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo | Melolink</title>
<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  </head>
  <body>
    <script>
      // 2. Configuração de Redirecionamento e Proxy
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });

        // O SEGREDO: Força o widget a apontar para o Netlify
        // Substitua pelo seu ID do site no Netlify se o setProxy sozinho não bastar
        window.localStorage.setItem("netlifySiteURL", "https://melolink.netlify.app");
        window.netlifyIdentity.setProxy("https://melolink.netlify.app");
      }
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // 4. Hack para o Decap CMS entender o Git Gateway na Vercel
      // Isso sobrescreve a configuração de API interna do CMS
      (function() {
        const interval = setInterval(() => {
          if (window.CMS) {
            clearInterval(interval);
            window.CMS.registerBackend('git-gateway', (args) => {
              args.api_root = 'https://melolink.netlify.app/.netlify/git/gateway';
              return args;
            });
          }
        }, 100);
      })();
    </script>
  </body>
</html>
