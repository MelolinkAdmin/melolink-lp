backend:
  name: github
  repo: MelolinkAdmin/melolink-lp
  branch: main
  base_url: https://melolink-auth-server-provider.vercel.app
  auth_endpoint: auth
  
publish_mode: simple 

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "configuracoes"
    label: "Configurações"
    files:
      - label: "Planos de Internet"
        name: "planos"
        file: "public/data/planos.json"
        fields:
          - label: "Lista de Planos"
            name: "plans"
            widget: "list"
            fields:
              - { label: "ID (slug)", name: "id", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Velocidade", name: "speed", widget: "string" }
              - { label: "Unidade (Mega/Giga)", name: "unit", widget: "string" }
              - { label: "Preço", name: "price", widget: "string" }
              - label: "Ícone"
                name: "iconClass"
                widget: "select"
                options: ["wifi", "home", "game", "rocket", "zap", "tv", "globe"]
              - label: "Tema"
                name: "theme"
                widget: "select"
                options: ["light", "dark"]
              - label: "Cor"
                name: "color"
                widget: "select"
                options: ["indigo", "red", "purple"]
              - { label: "Mais Vendido?", name: "isBestSeller", widget: "boolean", default: false }
              - label: "Benefícios"
                name: "benefits"
                widget: "list"
                field: { label: "Benefício", name: "text", widget: "string" }

      - label: "Contatos e Canais"
        name: "contatos"
        file: "public/data/contatos.json"
        fields:
          - label: "Canais de Atendimento"
            name: "channels"
            widget: "list"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - label: "Ícone"
                name: "iconName"
                widget: "select"
                options:
                  - { label: "Suporte (Headset)", value: "headset" }
                  - { label: "Comercial (Carrinho)", value: "shopping-cart" }
                  - { label: "Financeiro (Carteira)", value: "wallet" }
              - { label: "Telefone Exibido", name: "phone", widget: "string" }
              - { label: "Link do WhatsApp (api.whatsapp.com)", name: "link", widget: "string" }
              - label: "Horários"
                name: "hours"
                widget: "list"
                fields:
                  - { label: "Dias", name: "day", widget: "string" }
                  - { label: "Horário", name: "time", widget: "string" }

      - label: "Redes Sociais"
        name: "social"
        file: "public/data/social.json"
        fields:
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "TikTok", name: "tiktok", widget: "string" }
          - { label: "YouTube", name: "youtube", widget: "string" }
          - { label: "Facebook", name: "facebook", widget: "string" }
          - { label: "Kwai", name: "kwai", widget: "string" }
